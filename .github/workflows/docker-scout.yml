name: Scout docker images

on:
  workflow_dispatch:

jobs:
  scan-images:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      id-token: write

    env:
      AWS_REGION: $AWS_REGION
      ACCOUNT_ID: $ACCOUNT_ID

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Scout each image
        id: scout
        uses: docker/scout-action@v1
        with:
          command: cves
          images: |
            ${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend:develop
          format: json
          output: scout-report.json

      - name: Create issue for each vulnerability
        run: |
          echo "Processing"

          jq -c '.results[] | {image: .image, vulnerabilities: .vulnerabilities}' scout-report.json |
          while read -r entry; do
            IMAGE=$(echo "$entry" | jq -r '.image')
            echo "Imagen: $IMAGE"

            echo "$entry" | jq -c '.vulnerabilities[]' | while read -r vuln; do
              ID=$(echo "$vuln" | jq -r '.id')
              SEVERITY=$(echo "$vuln" | jq -r '.severity' | tr '[:upper:]' '[:lower:]')
              PACKAGE=$(echo "$vuln" | jq -r '.package.name')

              LABEL="severity/$SEVERITY"
              TITLE="[$IMAGE] Vulnerability $ID in $PACKAGE"

              # Check if already exists
              EXISTS=$(gh issue list --state open --search "$TITLE" --json title | jq 'length')

              if [ "$EXISTS" -eq 0 ]; then
                echo "Create issue: $TITLE with label $LABEL"
                gh issue create \
                  --title "$TITLE" \
                  --body "Vulnerabiilty **$ID** in **$PACKAGE** with severity **$SEVERITY**). \
                  --label "$LABEL"
              else
                echo "Existing issue; skip: $TITLE"
              fi
            done
          done
